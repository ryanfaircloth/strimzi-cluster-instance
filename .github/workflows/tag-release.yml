name: Tag Release

on:
    workflow_dispatch:
        inputs:
            chart:
                description: "Chart to release"
                required: true
                type: choice
                options:
                    - strimzi-cluster-instance
                    - strimzi-mirrormaker2-instance
                    - strimzi-kafka-users
            version:
                description: "Version to release (semver, e.g. 1.3.0)"
                required: true
                type: string

jobs:
    tag:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Create and push tag
              run: |
                  TAG="${{ inputs.chart }}/v${{ inputs.version }}"
                  git tag "${TAG}"
                  git push origin "${TAG}"
