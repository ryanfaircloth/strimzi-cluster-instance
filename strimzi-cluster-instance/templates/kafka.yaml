apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
    {{- with .Values.kafka.additionalAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "strimzi-cluster-instance.labels" . | nindent 4 }}
    {{- with .Values.kafka.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  name: {{ include "strimzi-cluster-instance.fullname" . }}
spec:
  kafka:
    authorization:
      type: {{ .Values.kafka.authorization.type | default "simple" }}
      {{- with .Values.kafka.superUsers }}
      superUsers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if .Values.kafka.brokerRackInitImage }}
    brokerRackInitImage: {{ .Values.kafka.brokerRackInitImage }}
    {{- end }}
    {{- with .Values.kafka.config }}
    config:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    listeners:
      - name: tls
        port: {{ .Values.kafka.listeners.tls.port }}
        tls: true
        type: internal
        authentication:
          type: {{ .Values.kafka.listeners.tls.authentication.type | default "scram-sha-512" }}
      {{- if .Values.gateway.enabled }}
      - name: tlsext
        port: {{ .Values.kafka.listeners.tlsext.port }}
        tls: true
        type: {{ .Values.kafka.listeners.tlsext.type | default "cluster-ip" }}
        authentication:
          type: {{ .Values.kafka.listeners.tlsext.authentication.type | default "scram-sha-512" }}
        configuration:
          brokerCertChainAndKey:
            certificate: tls.crt
            key: tls.key
            secretName: {{ include "strimzi-cluster-instance.fullname" . }}-gateway-cert
          {{- $brokerReplicas := 0 }}
          {{- range .Values.nodePools }}
            {{- if has "broker" .roles }}
              {{- $brokerReplicas = .replicas }}
            {{- end }}
          {{- end }}
          brokers:
          {{- range $i := until (int $brokerReplicas) }}
          - advertisedHost: broker-{{ $i }}.{{ $.Values.gateway.dnsSuffix }}
            advertisedPort: {{ $.Values.gateway.advertisedPort }}
            broker: {{ $i }}
          {{- end }}
          createBootstrapService: true
      {{- end }}
      {{- if .Values.kafka.listeners.lbext.enabled }}
      - name: lbext
        port: {{ .Values.kafka.listeners.lbext.port }}
        type: loadbalancer
        tls: true
        authentication:
          type: {{ .Values.kafka.listeners.lbext.authentication.type }}
        configuration:
          bootstrap:
            annotations:
              {{- toYaml .Values.kafka.listeners.lbext.configuration.annotations | nindent 14 }}
          {{- $lbextBrokerReplicas := 0 }}
          {{- range .Values.nodePools }}
            {{- if has "broker" .roles }}
              {{- $lbextBrokerReplicas = .replicas }}
            {{- end }}
          {{- end }}
          brokers:
          {{- range $i := until (int $lbextBrokerReplicas) }}
          - broker: {{ $i }}
            annotations:
              {{- toYaml $.Values.kafka.listeners.lbext.configuration.annotations | nindent 14 }}
          {{- end }}
      {{- end }}
      {{- if .Values.kafka.listeners.oauth.enabled }}
      - name: oauth
        port: {{ .Values.kafka.listeners.oauth.port }}
        tls: true
        type: {{ .Values.kafka.listeners.oauth.type | default "internal" }}
        authentication:
          type: custom
          sasl: true
          listenerConfig:
            sasl.enabled.mechanisms: OAUTHBEARER
            oauthbearer.sasl.server.callback.handler.class: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler
            oauthbearer.sasl.jaas.config: "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required;"
            sasl.oauthbearer.jwks.endpoint.url: {{ required "kafka.listeners.oauth.jwksEndpointUri is required when oauth is enabled" .Values.kafka.listeners.oauth.jwksEndpointUri | quote }}
            sasl.oauthbearer.expected.issuer: {{ required "kafka.listeners.oauth.validIssuerUri is required when oauth is enabled" .Values.kafka.listeners.oauth.validIssuerUri | quote }}
            {{- if .Values.kafka.listeners.oauth.expectedAudience }}
            sasl.oauthbearer.expected.audience: {{ .Values.kafka.listeners.oauth.expectedAudience | quote }}
            {{- end }}
            {{- if .Values.kafka.listeners.oauth.maxSecondsWithoutReauthentication }}
            oauthbearer.connections.max.reauth.ms: {{ mul (.Values.kafka.listeners.oauth.maxSecondsWithoutReauthentication | int) 1000 }}
            {{- end }}
        {{- if eq (.Values.kafka.listeners.oauth.type | default "internal") "loadbalancer" }}
        configuration:
          bootstrap:
            annotations:
              {{- toYaml .Values.kafka.listeners.oauth.configuration.annotations | nindent 14 }}
          {{- $oauthBrokerReplicas := 0 }}
          {{- range .Values.nodePools }}
            {{- if has "broker" .roles }}
              {{- $oauthBrokerReplicas = .replicas }}
            {{- end }}
          {{- end }}
          brokers:
          {{- range $i := until (int $oauthBrokerReplicas) }}
          - broker: {{ $i }}
            annotations:
              {{- toYaml $.Values.kafka.listeners.oauth.configuration.annotations | nindent 14 }}
          {{- end }}
        {{- end }}
      {{- end }}

    {{- if and .Values.kafka.metricsConfig (not (empty .Values.kafka.metricsConfig)) }}
    metricsConfig:
      {{- toYaml .Values.kafka.metricsConfig | nindent 6 }}
    {{- end }}
    {{- if and .Values.kafka.logging (not (empty .Values.kafka.logging)) }}
    logging:
      {{- toYaml .Values.kafka.logging | nindent 6 }}
    {{- else }}
    {{- $kafkaLog4j2 := .Values.logging.kafka.log4j2Properties | default "" }}
    {{- if eq $kafkaLog4j2 "" }}{{- $kafkaLog4j2 = .Values.logging.log4j2Properties | default "" }}{{- end }}
    {{- if $kafkaLog4j2 }}
    logging:
      type: external
      valueFrom:
        configMapKeyRef:
          name: {{ include "strimzi-cluster-instance.fullname" . }}-kafka-logging
          key: log4j2.properties
    {{- end }}
    {{- end }}
    {{- if .Values.kafka.metadataVersion }}
    metadataVersion: {{ .Values.kafka.metadataVersion }}
    {{- end }}
    {{- if .Values.kafka.rack }}
    rack:
      {{- toYaml .Values.kafka.rack | nindent 6 }}
    {{- end }}
    {{- if .Values.kafka.version }}
    version: {{ .Values.kafka.version }}
    {{- end }}
  cruiseControl:
    {{- with .Values.kafka.cruiseControl.config }}
    config:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.kafka.cruiseControl.brokerCapacity }}
    brokerCapacity:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.kafka.cruiseControl.resources }}
    resources:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.kafka.cruiseControl.jvmOptions }}
    jvmOptions:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if and .Values.kafka.cruiseControl.logging (not (empty .Values.kafka.cruiseControl.logging)) }}
    logging:
      {{- toYaml .Values.kafka.cruiseControl.logging | nindent 6 }}
    {{- else }}
    {{- $ccLog4j2 := .Values.logging.cruiseControl.log4j2Properties | default "" }}
    {{- if eq $ccLog4j2 "" }}{{- $ccLog4j2 = .Values.logging.log4j2Properties | default "" }}{{- end }}
    {{- if $ccLog4j2 }}
    logging:
      type: external
      valueFrom:
        configMapKeyRef:
          name: {{ include "strimzi-cluster-instance.fullname" . }}-cruisecontrol-logging
          key: log4j2.properties
    {{- end }}
    {{- end }}
    {{- with .Values.kafka.cruiseControl.template.pod }}
    template:
      pod:
        {{- with .metadata }}
        metadata:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if or .affinity $.Values.defaultArchitecture $.Values.kafka.cruiseControl.additionalNodeMatchExpressions }}
        affinity:
          {{- if .affinity }}
          {{/* User provided custom affinity - use as-is */}}
          {{- toYaml .affinity | nindent 10 }}
          {{- else }}
          {{/* Build default affinity with OS, arch, and additional terms */}}
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/os
                      operator: In
                      values:
                        - linux
                    {{- if $.Values.defaultArchitecture }}
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - {{ $.Values.defaultArchitecture }}
                    {{- end }}
                    {{- with $.Values.kafka.cruiseControl.additionalNodeMatchExpressions }}
                    {{- toYaml . | nindent 20 }}
                    {{- end }}
          {{- end }}
        {{- end }}
        {{- with .tolerations }}
        tolerations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .topologySpreadConstraints }}
        topologySpreadConstraints:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if .priorityClassName }}
        priorityClassName: {{ .priorityClassName }}
        {{- end }}
        {{- if .tmpDirSizeLimit }}
        tmpDirSizeLimit: {{ .tmpDirSizeLimit }}
        {{- end }}
        {{- with .volumes }}
        volumes:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    {{- end }}
  entityOperator:
    {{- with .Values.kafka.entityOperator.template.pod }}
    template:
      pod:
        {{- with .metadata }}
        metadata:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if or .affinity $.Values.defaultArchitecture $.Values.kafka.entityOperator.additionalNodeMatchExpressions }}
        affinity:
          {{- if .affinity }}
          {{/* User provided custom affinity - use as-is */}}
          {{- toYaml .affinity | nindent 10 }}
          {{- else }}
          {{/* Build default affinity with OS, arch, and additional terms */}}
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/os
                      operator: In
                      values:
                        - linux
                    {{- if $.Values.defaultArchitecture }}
                    - key: kubernetes.io/arch
                      operator: In
                      values:
                        - {{ $.Values.defaultArchitecture }}
                    {{- end }}
                    {{- with $.Values.kafka.entityOperator.additionalNodeMatchExpressions }}
                    {{- toYaml . | nindent 20 }}
                    {{- end }}
          {{- end }}
        {{- end }}
        {{- with .tolerations }}
        tolerations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .topologySpreadConstraints }}
        topologySpreadConstraints:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if .priorityClassName }}
        priorityClassName: {{ .priorityClassName }}
        {{- end }}
        {{- if .tmpDirSizeLimit }}
        tmpDirSizeLimit: {{ .tmpDirSizeLimit }}
        {{- end }}
        {{- with .volumes }}
        volumes:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
    topicOperator:
      {{- if.Values.kafka.entityOperator.topicOperator.watchAnyNamespace }}
      {{- else }}      
      {{- if .Values.kafka.entityOperator.topicOperator.watchedNamespace }}
      watchedNamespace: {{ .Values.kafka.entityOperator.topicOperator.watchedNamespace }}
      {{- else }}
      watchedNamespace: {{ .Release.Namespace }}
      {{- end }}
      {{- end }}
      {{- with .Values.kafka.entityOperator.topicOperator.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kafka.entityOperator.topicOperator.jvmOptions }}
      jvmOptions:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.kafka.entityOperator.topicOperator.logging (not (empty .Values.kafka.entityOperator.topicOperator.logging)) }}
      logging:
        {{- toYaml .Values.kafka.entityOperator.topicOperator.logging | nindent 8 }}
      {{- else }}
      {{- $toLog4j2 := .Values.logging.topicOperator.log4j2Properties | default "" }}
      {{- if eq $toLog4j2 "" }}{{- $toLog4j2 = .Values.logging.log4j2Properties | default "" }}{{- end }}
      {{- if $toLog4j2 }}
      logging:
        type: external
        valueFrom:
          configMapKeyRef:
            name: {{ include "strimzi-cluster-instance.fullname" . }}-topicoperator-logging
            key: log4j2.properties
      {{- end }}
      {{- end }}

    userOperator:
      {{- if.Values.kafka.entityOperator.userOperator.watchAnyNamespace }}
      {{- else }}      
      {{- if .Values.kafka.entityOperator.userOperator.watchedNamespace }}
      watchedNamespace: {{ .Values.kafka.entityOperator.userOperator.watchedNamespace }}
      {{- else }}
      watchedNamespace: {{ .Release.Namespace }}
      {{- end }}
      {{- end }}
      {{- with .Values.kafka.entityOperator.userOperator.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kafka.entityOperator.userOperator.jvmOptions }}
      jvmOptions:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.kafka.entityOperator.userOperator.logging (not (empty .Values.kafka.entityOperator.userOperator.logging)) }}
      logging:
        {{- toYaml .Values.kafka.entityOperator.userOperator.logging | nindent 8 }}
      {{- else }}
      {{- $uoLog4j2 := .Values.logging.userOperator.log4j2Properties | default "" }}
      {{- if eq $uoLog4j2 "" }}{{- $uoLog4j2 = .Values.logging.log4j2Properties | default "" }}{{- end }}
      {{- if $uoLog4j2 }}
      logging:
        type: external
        valueFrom:
          configMapKeyRef:
            name: {{ include "strimzi-cluster-instance.fullname" . }}-useroperator-logging
            key: log4j2.properties
      {{- end }}
      {{- end }}
